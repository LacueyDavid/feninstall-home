# ######## EDITOR #########
#https://wiki.archlinux.org/title/Category:Text_editors
# for example: vi nano nvim ...

#env = EDITOR, vim
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = WLR_NO_HARDWARE_CURSORS,1
env = cursor:no_hardware_cursors,true

env = ELECTRON_OZONE_PLATFORM_HINT,auto # Pour éviter que Discord/VSCode clignotent
env = NVD_BACKEND,direct # Pour l'accélération vidéo matérielle
